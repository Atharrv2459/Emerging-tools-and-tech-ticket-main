databases:
  - name: ticket-db
    databaseName: new_ticket
    plan: free  # Change to 'starter' for production ($7/month)

services:
  # Backend API Service
  - type: web
    name: ticket-backend
    runtime: docker
    dockerfilePath: ./backend/backend/Dockerfile
    dockerContext: ./backend/backend
    plan: free  # Change to 'starter' for production
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: ticket-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: INITIAL_ADMIN_NAME
        value: Super Admin
      - key: INITIAL_ADMIN_EMAIL
        sync: false  # Set this in Render dashboard
      - key: INITIAL_ADMIN_PASSWORD
        sync: false  # Set this in Render dashboard
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false  # Set this in Render dashboard
      - key: SMTP_PASS
        sync: false  # Set this in Render dashboard

  # Frontend Web Service (Docker with nginx)
  - type: web
    name: ticket-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: BACKEND_URL
        value: ticket-backend.onrender.com  # Render public URL
