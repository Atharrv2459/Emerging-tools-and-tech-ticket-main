services:
  # PostgreSQL Database
  database:
    image: postgres:16-alpine
    container_name: ticket_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: new_ticket
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./new_ticket.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d new_ticket"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js Backend
  backend:
    build:
      context: ./backend/backend
      dockerfile: Dockerfile
    container_name: ticket_backend
    restart: unless-stopped
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@database:5432/new_ticket
      JWT_SECRET: ${JWT_SECRET:-Abc123}
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME:-Super Admin}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-atharrv@gmail.com}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-Admin@123}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-atharrv@gmail.com}
      SMTP_PASS: ${SMTP_PASS:-qxjr xssb ezha uflx}
    ports:
      - "5001:5000"
    depends_on:
      database:
        condition: service_healthy

  # Nginx Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticket_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
