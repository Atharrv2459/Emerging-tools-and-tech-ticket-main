<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Ticket - Agent</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- ========== SIDEBAR ========== -->
        <nav class="sidebar">
            <div class="sidebar-brand">
                <h2>🎫 Ticket System</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">📊 Dashboard</a></li>
                <li><a href="unassigned-tickets.html">📥 Unassigned Tickets</a></li>
                <li><a href="my-tickets.html">📋 My Tickets</a></li>
                <li><a href="#" onclick="logout()">🚪 Logout</a></li>
            </ul>
        </nav>

        <!-- ========== MAIN CONTENT ========== -->
        <div class="main-content">
            <header class="header">
                <h1>Edit Ticket</h1>
                <div class="user-info">
                    <span id="user-name">Loading...</span>
                    <span class="role-badge">Agent</span>
                </div>
            </header>

            <main class="content">
                <div id="alert-container"></div>

                <div class="card">
                    <div class="card-header">
                        <h3>Edit Ticket #<span id="ticket-id">-</span></h3>
                    </div>
                    <div class="card-body">
                        <form id="edit-form">
                            <!-- Ticket Info (Read-only) -->
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Subject</label>
                                    <input type="text" id="subject" readonly>
                                </div>
                                <div class="form-group">
                                    <label>Category</label>
                                    <input type="text" id="category" readonly>
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label>Current Status</label>
                                    <input type="text" id="current-status" readonly>
                                </div>
                                <div class="form-group">
                                    <label>Priority</label>
                                    <input type="text" id="priority" readonly>
                                </div>
                            </div>

                            <hr style="margin: 20px 0;">

                            <!-- Editable Fields -->
                            <h4 style="margin-bottom: 15px; color: #4e73df;">Update Ticket</h4>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="status">Change Status</label>
                                    <select id="status" name="status">
                                        <option value="Open">Open</option>
                                        <option value="Assigned">Assigned</option>
                                        <option value="Requirements">Requirements</option>
                                        <option value="Development">Development</option>
                                        <option value="Internal Testing">Internal Testing</option>
                                        <option value="UAT">UAT</option>
                                        <option value="Resolved">Resolved</option>
                                        <option value="Closed">Closed</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="waiting_for_customer">Waiting for Customer</label>
                                    <select id="waiting_for_customer" name="waiting_for_customer">
                                        <option value="false">No</option>
                                        <option value="true">Yes</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="rca">Root Cause Analysis (RCA)</label>
                                <textarea id="rca" name="rca" placeholder="Describe the root cause of the issue..."></textarea>
                            </div>

                            <div class="form-group">
                                <label for="resolution">Resolution</label>
                                <textarea id="resolution" name="resolution" placeholder="Describe how the issue was resolved..."></textarea>
                            </div>

                            <div class="mt-20">
                                <button type="submit" class="btn btn-success">Save Changes</button>
                                <a href="my-tickets.html" class="btn btn-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </main>

            <footer class="footer">
                <p>&copy; 2024 Ticket Management System</p>
            </footer>
        </div>
    </div>

    <script src="../../js/api.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/utils.js"></script>

    <script>
        requireAuth();

        const ticketId = getUrlParam('id');
        if (!ticketId) window.location.href = 'my-tickets.html';

        document.addEventListener('DOMContentLoaded', async function() {
            loadUserProfile();
            loadTicketDetails();
        });

        async function loadUserProfile() {
            try {
                const profile = await getCustomerProfile();
                document.getElementById('user-name').textContent = profile.name || 'User';
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadTicketDetails() {
            try {
                const response = await getAgentTicket(ticketId);
                const ticket = response.ticket || response;

                document.getElementById('ticket-id').textContent = ticket.id;
                document.getElementById('subject').value = ticket.subject;
                document.getElementById('category').value = ticket.category + ' - ' + ticket.sub_category;
                document.getElementById('current-status').value = ticket.status;
                document.getElementById('priority').value = 'L' + ticket.priority;

                // Set current values
                document.getElementById('status').value = ticket.status;
                document.getElementById('waiting_for_customer').value = ticket.waiting_for_customer ? 'true' : 'false';
                document.getElementById('rca').value = ticket.rca || '';
                document.getElementById('resolution').value = ticket.resolution || '';

            } catch (error) {
                showAlert('Error loading ticket details', 'danger');
            }
        }

        // Handle form submission
        document.getElementById('edit-form').addEventListener('submit', async function(event) {
            event.preventDefault();

            const updateData = {
                status: document.getElementById('status').value,
                waiting_for_customer: document.getElementById('waiting_for_customer').value === 'true',
                rca: document.getElementById('rca').value,
                resolution: document.getElementById('resolution').value
            };

            try {
                await updateAgentTicket(ticketId, updateData);
                showAlert('Ticket updated successfully!', 'success');

                // Redirect after 2 seconds
                setTimeout(function() {
                    window.location.href = 'my-tickets.html';
                }, 2000);
            } catch (error) {
                showAlert('Error updating ticket: ' + error.message, 'danger');
            }
        });
    </script>
</body>
</html>
