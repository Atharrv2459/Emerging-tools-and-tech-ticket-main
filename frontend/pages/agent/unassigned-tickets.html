<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unassigned Tickets - Agent</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- ========== SIDEBAR ========== -->
        <nav class="sidebar">
            <div class="sidebar-brand">
                <h2>🎫 Ticket System</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">📊 Dashboard</a></li>
                <li><a href="unassigned-tickets.html" class="active">📥 Unassigned Tickets</a></li>
                <li><a href="my-tickets.html">📋 My Tickets</a></li>
                <li><a href="#" onclick="logout()">🚪 Logout</a></li>
            </ul>
        </nav>

        <!-- ========== MAIN CONTENT ========== -->
        <div class="main-content">
            <header class="header">
                <h1>Unassigned Tickets</h1>
                <div class="user-info">
                    <span id="user-name">Loading...</span>
                    <span class="role-badge">Agent</span>
                </div>
            </header>

            <main class="content">
                <div id="alert-container"></div>

                <div class="card">
                    <div class="card-header">
                        <h3>Available Tickets to Pick Up</h3>
                    </div>
                    <div class="card-body">
                        <div class="table-container" id="tickets-container">
                            <div class="loading"><div class="spinner"></div></div>
                        </div>
                    </div>
                </div>
            </main>

            <footer class="footer">
                <p>&copy; 2024 Ticket Management System</p>
            </footer>
        </div>
    </div>

    <script src="../../js/api.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/utils.js"></script>

    <script>
        requireAuth();

        document.addEventListener('DOMContentLoaded', async function() {
            loadUserProfile();
            loadUnassignedTickets();
        });

        async function loadUserProfile() {
            try {
                const profile = await getCustomerProfile();
                document.getElementById('user-name').textContent = profile.name || 'User';
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadUnassignedTickets() {
            try {
                const response = await getAgentUnassignedTickets();
                const tickets = response.tickets || response || [];
                renderTickets(tickets);
            } catch (error) {
                document.getElementById('tickets-container').innerHTML =
                    '<p class="text-center">Error loading tickets.</p>';
            }
        }

        function renderTickets(tickets) {
            const container = document.getElementById('tickets-container');

            if (!tickets || tickets.length === 0) {
                container.innerHTML = '<p class="text-center">No unassigned tickets available.</p>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Subject</th>
                            <th>Category</th>
                            <th>Priority</th>
                            <th>Created</th>
                            <th>Age</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            tickets.forEach(ticket => {
                html += `
                    <tr>
                        <td>#${ticket.id}</td>
                        <td>${escapeHtml(ticket.subject)}</td>
                        <td>${escapeHtml(ticket.category)} - ${escapeHtml(ticket.sub_category)}</td>
                        <td><span class="badge ${getPriorityClass(ticket.priority)}">L${ticket.priority}</span></td>
                        <td>${formatDate(ticket.created_at)}</td>
                        <td>${calculateTicketAge(ticket.created_at)}</td>
                        <td>
                            <button class="btn btn-sm btn-success" onclick="pickUpTicket(${ticket.id})">Pick Up</button>
                            <a href="view-ticket.html?id=${ticket.id}" class="btn btn-sm btn-secondary">View</a>
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        async function pickUpTicket(ticketId) {
            if (!confirm('Are you sure you want to pick up this ticket?')) {
                return;
            }

            try {
                await pickTicket(ticketId);
                showAlert('Ticket assigned to you successfully!', 'success');
                loadUnassignedTickets(); // Refresh list
            } catch (error) {
                showAlert('Error picking up ticket: ' + error.message, 'danger');
            }
        }
    </script>
</body>
</html>
