<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Ticket - Agent</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- ========== SIDEBAR ========== -->
        <nav class="sidebar">
            <div class="sidebar-brand">
                <h2>🎫 Ticket System</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">📊 Dashboard</a></li>
                <li><a href="unassigned-tickets.html">📥 Unassigned Tickets</a></li>
                <li><a href="my-tickets.html">📋 My Tickets</a></li>
                <li><a href="#" onclick="logout()">🚪 Logout</a></li>
            </ul>
        </nav>

        <!-- ========== MAIN CONTENT ========== -->
        <div class="main-content">
            <header class="header">
                <h1>View Ticket</h1>
                <div class="user-info">
                    <span id="user-name">Loading...</span>
                    <span class="role-badge">Agent</span>
                </div>
            </header>

            <main class="content">
                <div id="alert-container"></div>

                <div class="card">
                    <div class="card-header">
                        <h3>Ticket #<span id="ticket-id">-</span>: <span id="ticket-subject">Loading...</span></h3>
                    </div>
                    <div class="card-body" id="ticket-container">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>

                <!-- Comments Section -->
                <div class="card">
                    <div class="card-header">
                        <h3>Comments</h3>
                    </div>
                    <div class="card-body" id="comments-container">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>

                <div class="mt-20">
                    <a href="my-tickets.html" class="btn btn-secondary">Back to My Tickets</a>
                    <a href="edit-ticket.html?id=" id="edit-link" class="btn btn-warning">Edit Ticket</a>
                </div>
            </main>

            <footer class="footer">
                <p>&copy; 2024 Ticket Management System</p>
            </footer>
        </div>
    </div>

    <script src="../../js/api.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/utils.js"></script>

    <script>
        requireAuth();

        const ticketId = getUrlParam('id');
        if (!ticketId) window.location.href = 'my-tickets.html';

        document.getElementById('edit-link').href = 'edit-ticket.html?id=' + ticketId;

        document.addEventListener('DOMContentLoaded', async function() {
            loadUserProfile();
            loadTicketDetails();
            loadComments();
        });

        async function loadUserProfile() {
            try {
                const profile = await getCustomerProfile();
                document.getElementById('user-name').textContent = profile.name || 'User';
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadTicketDetails() {
            try {
                const response = await getAgentTicket(ticketId);
                const ticket = response.ticket || response;

                document.getElementById('ticket-id').textContent = ticket.id;
                document.getElementById('ticket-subject').textContent = ticket.subject;

                document.getElementById('ticket-container').innerHTML = `
                    <div class="ticket-details">
                        <div class="detail-item">
                            <label>Status</label>
                            <div class="value"><span class="badge ${getStatusClass(ticket.status)}">${ticket.status}</span></div>
                        </div>
                        <div class="detail-item">
                            <label>Priority</label>
                            <div class="value"><span class="badge ${getPriorityClass(ticket.priority)}">${getPriorityLabel(ticket.priority)}</span></div>
                        </div>
                        <div class="detail-item">
                            <label>Category</label>
                            <div class="value">${escapeHtml(ticket.category)} - ${escapeHtml(ticket.sub_category)}</div>
                        </div>
                        <div class="detail-item">
                            <label>Type</label>
                            <div class="value">${escapeHtml(ticket.type)}</div>
                        </div>
                        <div class="detail-item">
                            <label>Environment</label>
                            <div class="value">${escapeHtml(ticket.environment)}</div>
                        </div>
                        <div class="detail-item">
                            <label>Requester</label>
                            <div class="value">${escapeHtml(ticket.requester)}</div>
                        </div>
                        <div class="detail-item">
                            <label>Contact Email</label>
                            <div class="value">${escapeHtml(ticket.contact_email)}</div>
                        </div>
                        <div class="detail-item">
                            <label>Account Name</label>
                            <div class="value">${escapeHtml(ticket.account_name)}</div>
                        </div>
                        <div class="detail-item">
                            <label>Created At</label>
                            <div class="value">${formatDateTime(ticket.created_at)}</div>
                        </div>
                        <div class="detail-item">
                            <label>Ticket Age</label>
                            <div class="value">${calculateTicketAge(ticket.created_at)}</div>
                        </div>
                        <div class="detail-item">
                            <label>SLA Hours</label>
                            <div class="value">${ticket.sla_hours} hours</div>
                        </div>
                        <div class="detail-item">
                            <label>Waiting for Customer</label>
                            <div class="value">${ticket.waiting_for_customer ? 'Yes' : 'No'}</div>
                        </div>
                    </div>

                    <div style="margin-top: 20px;">
                        <h4>Description</h4>
                        <p style="background: #f8f9fc; padding: 15px; border-radius: 5px;">
                            ${escapeHtml(ticket.description) || 'No description.'}
                        </p>
                    </div>

                    ${ticket.rca ? `
                        <div style="margin-top: 20px;">
                            <h4>Root Cause Analysis (RCA)</h4>
                            <p style="background: #d4edda; padding: 15px; border-radius: 5px;">
                                ${escapeHtml(ticket.rca)}
                            </p>
                        </div>
                    ` : ''}

                    ${ticket.resolution ? `
                        <div style="margin-top: 20px;">
                            <h4>Resolution</h4>
                            <p style="background: #d4edda; padding: 15px; border-radius: 5px;">
                                ${escapeHtml(ticket.resolution)}
                            </p>
                        </div>
                    ` : ''}
                `;
            } catch (error) {
                document.getElementById('ticket-container').innerHTML =
                    '<p class="text-center">Error loading ticket.</p>';
            }
        }

        async function loadComments() {
            try {
                const response = await getTicketComments(ticketId);
                const comments = response.comments || response || [];
                renderComments(comments);
            } catch (error) {
                document.getElementById('comments-container').innerHTML = '<p>No comments.</p>';
            }
        }

        function renderComments(comments) {
            const container = document.getElementById('comments-container');

            if (!comments || comments.length === 0) {
                container.innerHTML = '<p>No comments yet.</p>';
                return;
            }

            let html = '';
            comments.forEach(comment => {
                html += `
                    <div class="comment">
                        <div class="comment-header">
                            <span class="comment-author">${escapeHtml(comment.commented_by_name || 'User')} (${escapeHtml(comment.commented_role)})</span>
                            <span class="comment-date">${formatDateTime(comment.created_at)}</span>
                        </div>
                        <strong>${escapeHtml(comment.comment_subject)}</strong>
                        <div class="comment-body">
                            <p>${escapeHtml(comment.comment_text)}</p>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }
    </script>
</body>
</html>
