<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Agent</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- ========== SIDEBAR ========== -->
        <nav class="sidebar">
            <div class="sidebar-brand">
                <h2>🎫 Ticket System</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html" class="active">📊 Dashboard</a></li>
                <li><a href="unassigned-tickets.html">📥 Unassigned Tickets</a></li>
                <li><a href="my-tickets.html">📋 My Tickets</a></li>
                <li><a href="#" onclick="logout()">🚪 Logout</a></li>
            </ul>
        </nav>

        <!-- ========== MAIN CONTENT ========== -->
        <div class="main-content">
            <header class="header">
                <h1>Agent Dashboard</h1>
                <div class="user-info">
                    <span id="user-name">Loading...</span>
                    <span class="role-badge">Agent</span>
                </div>
            </header>

            <main class="content">
                <div id="alert-container"></div>

                <!-- Stats Cards -->
                <div class="stats-grid">
                    <div class="stat-card primary">
                        <div class="stat-title">Unassigned Tickets</div>
                        <div class="stat-value" id="unassigned-count">-</div>
                    </div>
                    <div class="stat-card success">
                        <div class="stat-title">My Assigned Tickets</div>
                        <div class="stat-value" id="assigned-count">-</div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="card">
                    <div class="card-header">
                        <h3>Quick Actions</h3>
                    </div>
                    <div class="card-body">
                        <a href="unassigned-tickets.html" class="btn btn-primary">Pick Up Tickets</a>
                        <a href="my-tickets.html" class="btn btn-secondary">View My Tickets</a>
                    </div>
                </div>
            </main>

            <footer class="footer">
                <p>&copy; 2024 Ticket Management System</p>
            </footer>
        </div>
    </div>

    <script src="../../js/api.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/utils.js"></script>

    <script>
        requireAuth();

        document.addEventListener('DOMContentLoaded', async function() {
            loadUserProfile();
            loadDashboardData();
        });

        async function loadUserProfile() {
            try {
                const profile = await getCustomerProfile();
                document.getElementById('user-name').textContent = profile.name || 'User';
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadDashboardData() {
            try {
                const [unassigned, assigned] = await Promise.all([
                    getAgentUnassignedTickets().catch(() => ({ tickets: [] })),
                    getAgentAssignedTickets().catch(() => ({ tickets: [] }))
                ]);

                document.getElementById('unassigned-count').textContent =
                    (unassigned.tickets || unassigned || []).length;
                document.getElementById('assigned-count').textContent =
                    (assigned.tickets || assigned || []).length;
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }
    </script>
</body>
</html>
