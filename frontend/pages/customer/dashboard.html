<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Customer</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- ========== SIDEBAR ========== -->
        <nav class="sidebar">
            <div class="sidebar-brand">
                <h2>🎫 Ticket System</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html" class="active">📊 Dashboard</a></li>
                <li><a href="tickets.html">📋 My Tickets</a></li>
                <li><a href="create-ticket.html">➕ Create Ticket</a></li>
                <li><a href="profile.html">👤 Profile</a></li>
                <li><a href="#" onclick="logout()">🚪 Logout</a></li>
            </ul>
        </nav>

        <!-- ========== MAIN CONTENT ========== -->
        <div class="main-content">
            <!-- Header -->
            <header class="header">
                <h1>Customer Dashboard</h1>
                <div class="user-info">
                    <span id="user-name">Loading...</span>
                    <span class="role-badge" id="user-role">Customer</span>
                </div>
            </header>

            <!-- Content Area -->
            <main class="content">
                <!-- Alert Container -->
                <div id="alert-container"></div>

                <!-- Stats Cards -->
                <div class="stats-grid" id="stats-container">
                    <div class="stat-card primary">
                        <div class="stat-title">Open Tickets</div>
                        <div class="stat-value" id="open-count">-</div>
                    </div>
                    <div class="stat-card success">
                        <div class="stat-title">Closed Tickets</div>
                        <div class="stat-value" id="closed-count">-</div>
                    </div>
                    <div class="stat-card warning">
                        <div class="stat-title">Unassigned</div>
                        <div class="stat-value" id="unassigned-count">-</div>
                    </div>
                    <div class="stat-card danger">
                        <div class="stat-title">UAT</div>
                        <div class="stat-value" id="uat-count">-</div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="card">
                    <div class="card-header">
                        <h3>Quick Actions</h3>
                    </div>
                    <div class="card-body">
                        <a href="create-ticket.html" class="btn btn-primary">Create New Ticket</a>
                        <a href="tickets.html" class="btn btn-secondary">View All Tickets</a>
                    </div>
                </div>
            </main>

            <!-- Footer -->
            <footer class="footer">
                <p>&copy; 2024 Ticket Management System</p>
            </footer>
        </div>
    </div>

    <!-- JavaScript Files -->
    <script src="../../js/api.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/utils.js"></script>

    <script>
        // =============================================
        // CUSTOMER DASHBOARD SCRIPT
        // =============================================

        // Check if user is logged in
        if (!requireAuth()) {
            // requireAuth will redirect to login if not authenticated
        }

        // Load dashboard data when page loads
        document.addEventListener('DOMContentLoaded', async function() {
            // Load user profile
            loadUserProfile();

            // Load ticket counts
            loadTicketCounts();
        });

        // Function to load user profile
        async function loadUserProfile() {
            try {
                const profile = await getCustomerProfile();
                document.getElementById('user-name').textContent = profile.name || 'User';
                document.getElementById('user-role').textContent = getUserRoleDisplay();
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }

        // Function to load ticket counts
        async function loadTicketCounts() {
            try {
                const counts = await getCustomerTicketCounts();

                document.getElementById('open-count').textContent = counts.open?.count || 0;
                document.getElementById('closed-count').textContent = counts.closed?.count || 0;
                document.getElementById('unassigned-count').textContent = counts.unassigned?.count || 0;
                document.getElementById('uat-count').textContent = counts.uat?.count || 0;
            } catch (error) {
                console.error('Error loading counts:', error);
                showAlert('Error loading dashboard data', 'danger');
            }
        }
    </script>
</body>
</html>
