<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Customer</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- ========== SIDEBAR ========== -->
        <nav class="sidebar">
            <div class="sidebar-brand">
                <h2>🎫 Ticket System</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">📊 Dashboard</a></li>
                <li><a href="tickets.html">📋 My Tickets</a></li>
                <li><a href="create-ticket.html">➕ Create Ticket</a></li>
                <li><a href="profile.html" class="active">👤 Profile</a></li>
                <li><a href="#" onclick="logout()">🚪 Logout</a></li>
            </ul>
        </nav>

        <!-- ========== MAIN CONTENT ========== -->
        <div class="main-content">
            <!-- Header -->
            <header class="header">
                <h1>My Profile</h1>
                <div class="user-info">
                    <span id="user-name">Loading...</span>
                    <span class="role-badge">Customer</span>
                </div>
            </header>

            <!-- Content Area -->
            <main class="content">
                <!-- Alert Container -->
                <div id="alert-container"></div>

                <!-- Profile Card -->
                <div class="card">
                    <div class="card-header">
                        <h3>Profile Information</h3>
                    </div>
                    <div class="card-body" id="profile-container">
                        <div class="loading">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
            </main>

            <!-- Footer -->
            <footer class="footer">
                <p>&copy; 2024 Ticket Management System</p>
            </footer>
        </div>
    </div>

    <!-- JavaScript Files -->
    <script src="../../js/api.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/utils.js"></script>

    <script>
        // =============================================
        // PROFILE PAGE SCRIPT
        // =============================================

        // Check authentication
        requireAuth();

        // Load data when page loads
        document.addEventListener('DOMContentLoaded', async function() {
            loadProfile();
        });

        // Load user profile
        async function loadProfile() {
            try {
                const profile = await getCustomerProfile();
                document.getElementById('user-name').textContent = profile.name || 'User';

                // Render profile details
                document.getElementById('profile-container').innerHTML = `
                    <div class="ticket-details">
                        <div class="detail-item">
                            <label>Name</label>
                            <div class="value">${escapeHtml(profile.name)}</div>
                        </div>
                        <div class="detail-item">
                            <label>Email</label>
                            <div class="value">${escapeHtml(profile.email)}</div>
                        </div>
                        <div class="detail-item">
                            <label>Phone</label>
                            <div class="value">${escapeHtml(profile.phone) || '-'}</div>
                        </div>
                        <div class="detail-item">
                            <label>Organization</label>
                            <div class="value">${escapeHtml(profile.organization) || '-'}</div>
                        </div>
                        <div class="detail-item">
                            <label>Department</label>
                            <div class="value">${escapeHtml(profile.department) || '-'}</div>
                        </div>
                        <div class="detail-item">
                            <label>Account Name</label>
                            <div class="value">${escapeHtml(profile.account_name) || '-'}</div>
                        </div>
                        <div class="detail-item">
                            <label>Role</label>
                            <div class="value"><span class="badge badge-primary">${getUserRoleDisplay()}</span></div>
                        </div>
                        <div class="detail-item">
                            <label>Member Since</label>
                            <div class="value">${formatDate(profile.created_at)}</div>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading profile:', error);
                document.getElementById('profile-container').innerHTML =
                    '<p class="text-center">Error loading profile.</p>';
            }
        }
    </script>
</body>
</html>
