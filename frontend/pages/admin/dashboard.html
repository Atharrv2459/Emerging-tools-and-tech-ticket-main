<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Admin</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- ========== SIDEBAR ========== -->
        <nav class="sidebar">
            <div class="sidebar-brand">
                <h2>🎫 Ticket System</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html" class="active">📊 Dashboard</a></li>
                <li><a href="role-management.html">👤 Role Management</a></li>
                <li><a href="#" onclick="logout()">🚪 Logout</a></li>
            </ul>
        </nav>

        <!-- ========== MAIN CONTENT ========== -->
        <div class="main-content">
            <header class="header">
                <h1>Admin Dashboard</h1>
                <div class="user-info">
                    <span id="user-name">Loading...</span>
                    <span class="role-badge">Admin</span>
                </div>
            </header>

            <main class="content">
                <div id="alert-container"></div>

                <!-- Quick Actions -->
                <div class="card">
                    <div class="card-header">
                        <h3>Admin Actions</h3>
                    </div>
                    <div class="card-body">
                        <p>Welcome to the Admin Dashboard. Use the sidebar to navigate.</p>
                        <div class="mt-20">
                            <a href="role-management.html" class="btn btn-primary">Manage Users & Roles</a>
                        </div>
                    </div>
                </div>
            </main>

            <footer class="footer">
                <p>&copy; 2024 Ticket Management System</p>
            </footer>
        </div>
    </div>

    <script src="../../js/api.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/utils.js"></script>

    <script>
        requireAuth();

        document.addEventListener('DOMContentLoaded', async function() {
            loadUserProfile();
        });

        async function loadUserProfile() {
            try {
                const profile = await getCustomerProfile();
                document.getElementById('user-name').textContent = profile.name || 'User';
            } catch (error) {
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
